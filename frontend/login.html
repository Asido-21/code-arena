<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Code Arena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <div class="brand">
        <span class="brand-icon">&lt;/&gt;</span>
        <span class="brand-name">Code Arena</span>
      </div>
      <div class="card">
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to continue competing.</p>
        <div id="error-msg" class="error-msg hidden"></div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="your password" />
        </div>
        <button id="login-btn" onclick="login()">
          <span id="btn-text">Sign In</span>
          <span id="btn-loader" class="hidden">...</span>
        </button>
        <p class="footer-link">
          Don't have an account? <a href="register.html">Register</a>
        </p>
      </div>
    </div>
    <script src="js/login.js"></script>
  </body>
</html>
