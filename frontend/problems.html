<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Problems — Code Arena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/problems.css" />
  </head>
  <body>
    <div class="bg-grid"></div>

    <nav class="navbar">
      <div class="brand">
        <span class="brand-icon">&lt;/&gt;</span>
        <span class="brand-name">Code Arena</span>
      </div>
      <div class="nav-links">
        <a href="problems.html" class="active">Problems</a>
        <a href="submissions.html">Submissions</a>
      </div>
      <div class="nav-right">
        <span id="welcome-msg" class="welcome"></span>
        <button onclick="logout()" class="logout-btn">Logout</button>
      </div>
    </nav>

    <main class="container">
      <div class="page-header">
        <h1>Problem Set</h1>
        <p class="subtitle">Solve problems. Climb the leaderboard.</p>
      </div>

      <div class="filters">
        <button class="filter-btn active" onclick="filterProblems('all', this)">
          All
        </button>
        <button class="filter-btn" onclick="filterProblems('Easy', this)">
          Easy
        </button>
        <button class="filter-btn" onclick="filterProblems('Medium', this)">
          Medium
        </button>
        <button class="filter-btn" onclick="filterProblems('Hard', this)">
          Hard
        </button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Title</th>
              <th>Difficulty</th>
              <th>Tags</th>
              <th>Acceptance</th>
            </tr>
          </thead>
          <tbody id="problems-body">
            <tr>
              <td colspan="5" class="loading">Loading problems...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>

    <script src="js/problems.js"></script>
  </body>
</html>
