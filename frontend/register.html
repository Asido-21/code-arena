<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — Code Arena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/register.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <div class="brand">
        <span class="brand-icon">&lt;/&gt;</span>
        <span class="brand-name">Code Arena</span>
      </div>
      <div class="card">
        <h1>Create Account</h1>
        <p class="subtitle">Join the arena. Start competing.</p>
        <div id="error-msg" class="error-msg hidden"></div>
        <div id="success-msg" class="success-msg hidden"></div>
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            placeholder="e.g. codemaster99"
            autocomplete="off"
          />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="min. 6 characters"
          />
        </div>
        <button id="register-btn" onclick="register()">
          <span id="btn-text">Create Account</span>
          <span id="btn-loader" class="hidden">...</span>
        </button>
        <p class="footer-link">
          Already have an account? <a href="login.html">Sign in</a>
        </p>
      </div>
    </div>
    <script src="js/register.js"></script>
  </body>
</html>
