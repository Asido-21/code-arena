<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Problem — Code Arena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/problem.css" />
  </head>
  <body>
    <div class="navbar">
      <div class="brand">
        <span class="brand-icon">&lt;/&gt;</span>
        <span class="brand-name">Code Arena</span>
      </div>
      <div class="nav-center" id="problem-title">Loading...</div>
      <div class="nav-right">
        <select id="language-select">
          <option value="javascript">JavaScript</option>
          <option value="python">Python</option>
          <option value="java">Java</option>
          <option value="cpp">C++</option>
        </select>
        <button id="submit-btn" onclick="submitCode()">Submit</button>
      </div>
    </div>

    <div class="workspace">
      <!-- Left panel: problem description -->
      <div class="panel left-panel">
        <div class="tabs">
          <button class="tab active">Description</button>
          <button class="tab" onclick="showHints()">Hints</button>
        </div>

        <div id="description-panel" class="panel-content">
          <div id="difficulty-badge"></div>
          <p id="problem-description" class="description-text">Loading...</p>

          <div class="section">
            <h3>Examples</h3>
            <div id="examples"></div>
          </div>

          <div class="section">
            <h3>Constraints</h3>
            <ul id="constraints"></ul>
          </div>
        </div>

        <div id="hints-panel" class="panel-content hidden">
          <div class="hint-warning">
            ⚠ Using hints affects your Learning Rating only — Hardcore Rating
            stays clean.
          </div>
          <div id="hint-list"></div>
        </div>
      </div>

      <!-- Right panel: code editor -->
      <div class="panel right-panel">
        <div id="editor"></div>
        <div id="verdict-bar" class="verdict-bar hidden"></div>
      </div>
    </div>

    <!-- Monaco Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script src="js/problem.js"></script>
  </body>
</html>
